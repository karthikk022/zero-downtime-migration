apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: user-service
    release: {{ .Release.Name }}
