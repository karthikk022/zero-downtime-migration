replicaCount: 3
image:
  repository: zero-downtime/product-service
  tag: latest
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 3002
resources:
  limits: { cpu: 300m, memory: 256Mi }
  requests: { cpu: 100m, memory: 128Mi }
env:
  - name: DB_HOST
    value: "zero-downtime-mysql"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: password
  - name: DB_NAME
    value: "ecommerce"
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
pdb:
  enabled: true
  minAvailable: 2

serviceAccount:
  create: true
  name:
