apiVersion: v1
kind: Service
metadata:
  name: ecommerce
  namespace: production
  labels:
    app: ecommerce
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: ecommerce
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-blue-green
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/actions.blue-green: |
      {
        "type": "forward",
        "forwardConfig": {
          "targetGroups": [
            {"serviceName": "app-blue", "servicePort": "80", "weight": 90},
            {"serviceName": "app-green", "servicePort": "80", "weight": 10}
          ],
          "targetGroupStickinessConfig": {"enabled": false}
        }
      }
spec:
  rules:
    - host: ${INGRESS_HOST}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: blue-green
                port:
                  name: use-annotation
