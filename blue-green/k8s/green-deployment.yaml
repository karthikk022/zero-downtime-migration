apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: production
  labels:
    app: ecommerce
    version: green
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce
      version: green
  template:
    metadata:
      labels:
        app: ecommerce
        version: green
    spec:
      containers:
        - name: frontend
          image: zero-downtime/frontend:2.0.0
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: app-green
  namespace: production
  labels:
    app: ecommerce
    version: green
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: ecommerce
    version: green
