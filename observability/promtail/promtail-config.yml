server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kubernetes-pods
    pipeline_stages:
      - docker: {}
      - drop:
          source: stream
          value: stderr
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_annotation_kubernetes_io_log_collect
        action: keep
        regex: "true"
      - source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - source_labels:
          - __meta_kubernetes_pod_label_app
        target_label: app
      - action: replace
        replacement: /var/log/pods/$1/$2/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__

  - job_name: kubernetes-nodes
    pipeline_stages:
      - regex:
          expression: "^(?s)(?P<time>\\S+?)\\.\\d+\\s+(?P<stream>stdout|stderr)\\s+(?P<flags>\\S+?)\\s+(?P<content>.*)$"
      - timestamp:
          source: time
          format: RFC3339Nano
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
