global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

route:
  group_by: ["alertname", "cluster", "namespace"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 4h
    - match:
        alertname: "PodCrashLoopBackOff"
      receiver: "critical"
      repeat_interval: 5m

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "critical"
    slack_configs:
      - channel: "#critical"
        title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true
    pagerduty_configs:
      - severity: critical
        routing_key: "${PAGERDUTY_ROUTING_KEY}"

  - name: "warning"
    slack_configs:
      - channel: "#alerts"
        title: "⚠️ WARNING: {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "namespace", "pod"]
