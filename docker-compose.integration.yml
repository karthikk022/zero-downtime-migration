version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: zero-downtime-integration-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce_pass
    volumes:
      - ./monolith/src/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./monolith/src/models/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
